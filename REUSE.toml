version = 1

# cSpell: words vitest

[[annotations]]
# Files that cannot have a builtin SPDX comment
path = [
  "project-words.txt",
  "requirements-docs.txt",

  "cspell.json",
  "frontend/.prettierrc.json",
  "frontend/.vscode/extensions.json",
  "frontend/e2e/tsconfig.json",
  "frontend/package-lock.json",
  "frontend/package.json",
  "frontend/trufotbot-openapi.json",
  "frontend/tsconfig.app.json",
  "frontend/tsconfig.json",
  "frontend/tsconfig.node.json",
  "frontend/tsconfig.vitest.json",

  "Cargo.lock",

  "frontend/public/favicon.ico",
]

SPDX-License-Identifier = "GPL-3.0-only"
SPDX-FileCopyrightText = "Copyright (C) 2024 Ohad Lutzky <lutzky@gmail.com>"

[[annotations]]
path = [
  "frontend/src/openapi/**"
]

# Assuming these files are governed by the same license as the rest of the
# project; they are auto-generated by https://github.com/hey-api/openapi-ts,
# which does not seem to have explicit guidance on this.
SPDX-License-Identifier = "GPL-3.0-only"
SPDX-FileCopyrightText = "NONE"
