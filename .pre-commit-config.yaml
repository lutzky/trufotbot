# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo-fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy
        description: Lints Rust code with cargo clippy.
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Checks the Rust project for errors.
        entry: cargo check --all-targets
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        description: Runs Rust tests.
        entry: cargo test --all-targets
        language: system
        files: ^frontend/assets/|\.rs$
        pass_filenames: false
