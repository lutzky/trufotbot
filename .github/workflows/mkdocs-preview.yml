name: Deploy mkdocs PR previews
on:
  pull_request:
      types:
        - opened
        - reopened
        - synchronize
        - closed

concurrency: preview-${{ github.ref }}

jobs:
  deploy-mkdocs-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install -r requirements-docs.txt
        if: github.event.action != 'closed'

      - name: Build site
        run: mkdocs build
        if: github.event.action != 'closed'

      - uses: rossjrw/pr-preview-action@v1 # cSpell: disable-line
        with:
          source-dir: ./site/
          preview-branch: gh-pages
