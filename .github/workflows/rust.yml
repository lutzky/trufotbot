name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: sqlite:trufotbot-github-ci.db

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install just
      uses: baptiste0928/cargo-install@v3
      with:
        crate: just
    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown
    - name: Install trunk
      uses: baptiste0928/cargo-install@v3
      with:
        crate: trunk
    - name: Install sqlx-cli
      uses: baptiste0928/cargo-install@v3
      with:
        crate: sqlx-cli
    - name: Prepare DB (...yes, for build)
      run: just reset_db
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    # Clippy does some building and relies on the db, so it's more efficient to
    # have it be in the same job as build.
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features

  format_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install yew-fmt
      uses: baptiste0928/cargo-install@v3
      with:
        crate: yew-fmt
    - name: Check formatting
      run: RUSTFMT=yew-fmt cargo fmt --all -- --check

# TODO: Use pre-commit instead of manually re-defining steps above. Make sure
# you don't repeat the heavyweight steps, like build and test, in pre-commit.
