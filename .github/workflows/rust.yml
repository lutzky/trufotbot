name: Rust

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: sqlite:trufotbot-github-ci.db

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache Rust dependencies and build artifacts
      uses: Swatinem/rust-cache@v2 # cSpell: ignore Swatinem
    - name: Install just
      uses: baptiste0928/cargo-install@v3
      with:
        crate: just
    - name: Install sqlx-cli
      uses: baptiste0928/cargo-install@v3
      with:
        crate: sqlx-cli
    - name: Prepare DB (required for build)
      run: just reset_db
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  clippy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache Rust dependencies and build artifacts
      uses: Swatinem/rust-cache@v2
    - name: Install just
      uses: baptiste0928/cargo-install@v3
      with:
        crate: just
    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown
    - name: Install trunk
      uses: baptiste0928/cargo-install@v3
      with:
        crate: trunk
    - name: Install sqlx-cli
      uses: baptiste0928/cargo-install@v3
      with:
        crate: sqlx-cli
    - name: Prepare DB (required for clippy)
      run: just reset_db
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features

  format_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: cargo fmt --all -- --check

# TODO: Use pre-commit instead of manually re-defining steps above. Make sure
# you don't repeat the heavyweight steps, like build and test, in pre-commit.
