name: Vue

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22.21.0'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - run: npm ci
    - run: npm run lint
    - run: npm run type-check
    - run: npm run test:unit
    - run: npm run format -- --check

# TODO: Use pre-commit instead of manually re-defining steps above. Make sure
# you don't repeat the heavyweight steps, like build and test, in pre-commit.
